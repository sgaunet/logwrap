# https://taskfile.dev
version: '3'
vars:
  BINFILE: logwrap
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "development"
  COMMIT:
    sh: git rev-parse HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

tasks:

  default:
    desc: "List tasks"
    cmds:
      - task -a

  lint:
    desc: "Run linter"
    cmds:
      - golangci-lint run

  test:
    desc: "Run all tests"
    cmds:
      - go test ./... -v

  test-coverage:
    desc: "Run tests with coverage report"
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  test-race:
    desc: "Run tests with race detection"
    cmds:
      - go test ./... -race -v

  build:
    desc: "Build binary"
    cmds:
      - CGO_ENABLED=0 go build -ldflags "-X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.buildDate={{.BUILD_DATE}}" -o {{ .BINFILE }} cmd/logwrap/*.go

  snapshot:
    desc: "Create snapshot"
    cmds:
      - GITLAB_TOKEN="" goreleaser --clean --snapshot
    
  release:
    desc: "Create release"
    cmds:
      - GITLAB_TOKEN="" goreleaser --clean --skip validate
    